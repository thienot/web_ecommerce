name: Build and Push Docker Images

on:
  push:
    branches: 
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo_owner: ${{ steps.lowercase.outputs.repo_owner }}
      repo_name: ${{ steps.lowercase.outputs.repo_name }}
    steps:
    - name: Convert to lowercase
      id: lowercase
      run: |
        echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
        echo "repo_name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
        echo "Repository owner (lowercase): ${GITHUB_REPOSITORY_OWNER,,}"

  build-laravel:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/ecommerce-laravel-app
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Laravel
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/app/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-nginx:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/ecommerce-nginx
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Nginx
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/nginx/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-mysql:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/ecommerce-mysql
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Check if MySQL Dockerfile exists
      id: check_mysql
      run: |
        if [ -f "docker/mysql/Dockerfile" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build and push MySQL
      if: steps.check_mysql.outputs.exists == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/mysql/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-redis:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/ecommerce-redis
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Check if Redis Dockerfile exists
      id: check_redis
      run: |
        if [ -f "docker/redis/Dockerfile" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Redis
      if: steps.check_redis.outputs.exists == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/redis/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-phpmyadmin:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/ecommerce-phpmyadmin
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Check if phpMyAdmin Dockerfile exists
      id: check_phpmyadmin
      run: |
        if [ -f "docker/phpmyadmin/Dockerfile" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build and push phpMyAdmin
      if: steps.check_phpmyadmin.outputs.exists == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/phpmyadmin/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Security scan - table format, không cần GitHub Advanced Security
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-laravel, build-nginx]
    if: always() && (needs.build-laravel.result == 'success' || needs.build-nginx.result == 'success')
    permissions:
      contents: read
      packages: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Run Trivy scanner on Laravel image
      uses: aquasecurity/trivy-action@v0.35.0  # SHA: 57a97c7 - safe version after supply chain attack fix
      if: needs.build-laravel.result == 'success'
      with:
        image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-laravel-app:latest
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy scanner on Nginx image
      uses: aquasecurity/trivy-action@v0.35.0  # SHA: 57a97c7 - safe version after supply chain attack fix
      if: needs.build-nginx.result == 'success'
      with:
        image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-nginx:latest
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'